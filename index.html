<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#f0f0f0">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <title>LiveTranslate</title>
  <style>
    :root {
      --bg1: #f0f0f0; --bg2: #ffffff; --bg3: #e4e4e4;
      --accent: #c89600; --accent2: #b08300;
      --text1: #1a1a1a; --text2: #555555; --text3: #999999;
      --ok: #16a34a; --err: #dc2626; --warn: #d97706;
      --border: rgba(0,0,0,0.12);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Noto Sans TC', sans-serif;
      background: var(--bg1); color: var(--text1);
      height: 100vh; height: 100dvh; overflow: hidden;
      display: flex; flex-direction: column;
    }

    /* ===== HEADER ===== */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; background: var(--bg2);
      border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 8px;
    }
    .logo { display:flex; align-items:center; gap:8px; font-size:17px; font-weight:700; color:var(--accent); white-space:nowrap; }
    .logo-icon { width:32px; height:32px; background:linear-gradient(135deg,#d4a017,#c89600); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; color:#fff; }
    .header-actions { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }

    /* ===== BUTTONS ===== */
    .btn {
      padding:6px 12px; border:1px solid var(--border); border-radius:8px;
      background:var(--bg3); color:var(--text1); font-size:13px; cursor:pointer;
      display:flex; align-items:center; gap:4px; white-space:nowrap; transition:all .2s;
    }
    .btn:hover { border-color:var(--accent); background:rgba(200,150,0,.1); }
    .btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
    .btn-sm { padding:4px 8px; font-size:12px; }
    select.lang-sel {
      padding:6px 8px; background:var(--bg3); border:1px solid var(--border);
      border-radius:8px; color:var(--text1); font-size:13px; outline:none; max-width:120px;
    }

    /* ===== MAIN LAYOUT ===== */
    .main { flex:1; display:flex; overflow:hidden; position:relative; }

    /* Desktop: side by side */
    .panel-transcript { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
    .panel-notes { width:340px; display:flex; flex-direction:column; border-left:1px solid var(--border); overflow:hidden; }
    .panel-claude { width:380px; display:flex; flex-direction:column; border-left:1px solid var(--border); overflow:hidden; }

    /* ===== CLAUDE CHAT ===== */
    .claude-header { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-bottom:1px solid var(--border); flex-shrink:0; cursor:pointer; }
    .claude-header-left { display:flex; align-items:center; gap:8px; }
    .claude-avatar { width:28px; height:28px; background:linear-gradient(135deg,#d4a017,#c89600); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; }
    .claude-msgs { flex:1; overflow-y:auto; padding:12px 14px; display:flex; flex-direction:column; gap:10px; }
    .claude-msgs::-webkit-scrollbar { width:4px; }
    .claude-msgs::-webkit-scrollbar-thumb { background:rgba(0,0,0,.15); border-radius:2px; }
    .cmsg { max-width:92%; padding:10px 14px; border-radius:12px; font-size:13px; line-height:1.6; word-break:break-word; animation:fadeIn .3s; }
    .cmsg-user { align-self:flex-end; background:var(--accent); color:#fff; border-bottom-right-radius:4px; }
    .cmsg-ai { align-self:flex-start; background:var(--bg3); color:var(--text1); border-bottom-left-radius:4px; }
    .cmsg-ai pre { background:rgba(0,0,0,.06); padding:8px; border-radius:6px; overflow-x:auto; margin:6px 0; font-size:12px; }
    .cmsg-ai code { font-size:12px; }
    .cmsg-system { align-self:center; background:transparent; color:var(--text3); font-size:12px; text-align:center; padding:4px; }
    .cmsg-typing { align-self:flex-start; color:var(--text3); font-size:13px; padding:8px 14px; }
    .cmsg-typing::after { content:'...'; animation:dots 1.5s infinite; }
    @keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }
    .claude-input-area { display:flex; gap:6px; padding:10px 14px; border-top:1px solid var(--border); flex-shrink:0; }
    .claude-input { flex:1; padding:10px 12px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text1); font-size:14px; outline:none; resize:none; font-family:inherit; min-height:42px; max-height:120px; }
    .claude-input:focus { border-color:var(--accent); }
    .claude-input::placeholder { color:var(--text3); }
    .claude-send { padding:10px 14px; background:var(--accent); border:none; border-radius:8px; color:#fff; font-size:14px; cursor:pointer; align-self:flex-end; }
    .claude-send:disabled { opacity:.4; cursor:not-allowed; }
    .claude-setup { padding:20px 14px; display:flex; flex-direction:column; gap:12px; }
    .claude-key-input { width:100%; padding:10px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text1); font-size:13px; outline:none; font-family:monospace; }
    .claude-key-input:focus { border-color:var(--accent); }
    .quick-btns { display:flex; flex-wrap:wrap; gap:4px; padding:4px 14px 8px; flex-shrink:0; }
    .quick-btn { padding:4px 10px; background:var(--bg3); border:1px solid var(--border); border-radius:14px; color:var(--text2); font-size:11px; cursor:pointer; transition:all .2s; }
    .quick-btn:hover { border-color:var(--accent); color:var(--accent); }

    /* ===== MOBILE TABS (horizontal tab mode) ===== */
    .mobile-tabs {
      display:none; background:var(--bg2); border-bottom:1px solid var(--border);
      flex-shrink:0;
    }
    .mobile-tabs-inner { display:flex; }
    .mob-tab {
      flex:1; padding:10px; text-align:center; font-size:14px; font-weight:500;
      color:var(--text3); cursor:pointer; border-bottom:2px solid transparent; transition:all .2s;
    }
    .mob-tab.active { color:var(--accent); border-bottom-color:var(--accent); }

    /* Layout toggle button */
    .layout-toggle { display:none; }

    @media(max-width:768px) {
      .layout-toggle { display:flex; }
      .header-actions .hide-mobile { display:none; }

      /* Compact header on mobile */
      .header { padding:6px 10px; gap:4px; flex-wrap:wrap; }
      .logo { font-size:14px; gap:4px; }
      .logo-icon { width:26px; height:26px; font-size:13px; border-radius:6px; }
      .header-actions { gap:4px; }
      .btn { padding:4px 8px; font-size:12px; gap:2px; }
      select.lang-sel { padding:4px 6px; font-size:12px; max-width:100px; }

      /* === Horizontal mode (tab switching, default) === */
      body:not(.vertical-mode) .mobile-tabs { display:block; }
      body:not(.vertical-mode) .panel-notes,
      body:not(.vertical-mode) .panel-claude {
        width:100%; position:absolute; inset:0; background:var(--bg2); border:none; display:none;
      }
      body:not(.vertical-mode) .panel-notes.mob-visible,
      body:not(.vertical-mode) .panel-claude.mob-visible { display:flex; z-index:10; }
      body:not(.vertical-mode) .panel-transcript { display:flex; }
      body:not(.vertical-mode) .panel-transcript.mob-hidden { display:none; }

      /* === Vertical mode (stacked, default on mobile) === */
      body.vertical-mode .mobile-tabs { display:none; }
      body.vertical-mode .main { flex-direction:column; }
      body.vertical-mode .panel-transcript {
        flex:1; border-bottom:1px solid var(--border); min-height:0;
        width:100%; border-left:none;
      }
      body.vertical-mode .panel-notes {
        flex:2; width:100%; display:flex; border-left:none;
        border-bottom:1px solid var(--border); min-height:0;
      }
      body.vertical-mode .panel-claude {
        flex:1; width:100%; display:flex; border-left:none; min-height:0;
      }
      /* Collapsed panels in vertical mobile */
      body.vertical-mode .panel-transcript.collapsed {
        flex:0 0 36px !important; overflow:hidden;
      }
      body.vertical-mode .panel-transcript.collapsed > :not(.transcript-collapse-bar) { display:none !important; }
      body.vertical-mode .panel-notes.collapsed {
        flex:0 0 36px !important;
      }
      body.vertical-mode .panel-claude.collapsed {
        flex:0 0 36px !important;
      }
      /* Collapse bar styling */
      .panel-collapse-bar {
        display:none; padding:6px 12px; background:var(--bg2);
        border-bottom:1px solid var(--border); flex-shrink:0;
        align-items:center; justify-content:space-between; cursor:pointer;
        font-size:13px; font-weight:500; color:var(--text2);
      }
      body.vertical-mode .panel-collapse-bar { display:flex; }
      .panel-collapse-bar .panel-toggle { font-size:12px; }

      /* Mobile vertical: compact notes/claude headers */
      body.vertical-mode .notes-header { padding:6px 12px; }
      body.vertical-mode .claude-header { padding:6px 12px; }
      body.vertical-mode .notes-header span,
      body.vertical-mode .claude-header span,
      body.vertical-mode .claude-header-left span { font-size:13px !important; }
      body.vertical-mode .claude-avatar { width:22px; height:22px; font-size:11px; }
    }

    /* ===== TRANSCRIPT ===== */
    .transcript-scroll { flex:1; overflow-y:auto; padding:12px 16px; scroll-behavior:smooth; }
    .transcript-scroll::-webkit-scrollbar { width:4px; }
    .transcript-scroll::-webkit-scrollbar-thumb { background:rgba(0,0,0,.15); border-radius:2px; }

    .entry {
      display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--border);
      cursor:pointer; transition:background .2s; border-radius:6px;
    }
    .entry:hover { background:rgba(200,150,0,.06); }
    .entry.highlight { background:rgba(200,150,0,.12); }
    .entry-time { font-size:11px; color:var(--text3); min-width:50px; padding-top:2px; font-variant-numeric:tabular-nums; }
    .entry-content { flex:1; min-width:0; }
    .entry-original { font-size:14px; line-height:1.5; color:var(--text1); margin-bottom:4px; word-break:break-word; }
    .entry-translation { font-size:13px; line-height:1.5; color:var(--accent); padding-left:10px; border-left:2px solid var(--accent); opacity:.85; word-break:break-word; }
    .entry-interim { opacity:.4; font-style:italic; }

    .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:12px; color:var(--text3); }
    .empty-icon { font-size:48px; opacity:.3; }

    /* ===== AUDIO PLAYER ===== */
    .audio-bar {
      display:flex; align-items:center; gap:10px; padding:8px 16px;
      background:var(--bg2); border-top:1px solid var(--border); flex-shrink:0;
    }
    .play-btn {
      width:36px; height:36px; border-radius:50%; border:none;
      background:var(--accent); color:#fff; font-size:16px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
    }
    .audio-seek {
      flex:1; -webkit-appearance:none; height:4px; background:rgba(0,0,0,.1);
      border-radius:2px; outline:none;
    }
    .audio-seek::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; background:var(--accent); border-radius:50%; cursor:pointer; }
    .audio-time { font-size:12px; color:var(--text3); font-variant-numeric:tabular-nums; min-width:90px; text-align:center; }

    /* ===== RECORD CONTROLS ===== */
    .controls {
      display:flex; align-items:center; justify-content:center; gap:14px;
      padding:10px 16px; background:var(--bg2); border-top:1px solid var(--border); flex-shrink:0;
    }
    @media(max-width:768px) {
      .controls { padding:6px 10px; gap:8px; }
    }
    .rec-btn {
      width:50px; height:50px; border-radius:50%; border:3px solid var(--err);
      background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .3s;
    }
    .rec-btn-inner { width:22px; height:22px; background:var(--err); border-radius:50%; transition:all .3s; }
    .rec-btn.on .rec-btn-inner { border-radius:4px; width:18px; height:18px; }
    .rec-btn.on { animation:recPulse 1.5s infinite; }
    @keyframes recPulse { 0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)} 50%{box-shadow:0 0 0 10px rgba(248,113,113,0)} }
    .timer { font-size:15px; font-weight:600; color:var(--text2); font-variant-numeric:tabular-nums; min-width:60px; text-align:center; }
    .timer.on { color:var(--err); }
    .status-dot { width:8px; height:8px; border-radius:50%; background:var(--text3); }
    .status-dot.on { background:var(--ok); animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ===== NOTES PANEL ===== */
    .notes-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 14px; border-bottom:1px solid var(--border); flex-shrink:0;
      cursor:pointer;
    }
    .notes-tabs { display:flex; gap:2px; background:var(--bg3); border-radius:6px; padding:2px; }
    .notes-tab {
      padding:5px 12px; border:none; background:transparent; color:var(--text3);
      border-radius:5px; font-size:12px; cursor:pointer; transition:all .2s;
    }
    .notes-tab.active { background:var(--accent); color:#fff; }

    /* Text Notes */
    .notes-list { flex:1; overflow-y:auto; padding:10px 14px; }
    .note-item {
      display:flex; gap:8px; padding:10px; margin-bottom:8px; background:var(--bg3);
      border-radius:8px; border:1px solid var(--border); cursor:pointer; transition:all .2s;
    }
    .note-item:hover { border-color:var(--accent); }
    .note-item.highlight { border-color:var(--accent); background:rgba(200,150,0,.1); }
    .note-time { font-size:11px; color:var(--accent); white-space:nowrap; padding-top:1px; }
    .note-text { font-size:13px; color:var(--text1); line-height:1.4; flex:1; word-break:break-word; }
    .note-del { background:none; border:none; color:var(--text3); cursor:pointer; font-size:14px; padding:0 2px; }
    .note-del:hover { color:var(--err); }

    .note-input-area {
      display:flex; gap:6px; padding:10px 14px; border-top:1px solid var(--border); flex-shrink:0;
    }
    .note-input {
      flex:1; padding:10px 12px; background:var(--bg3); border:1px solid var(--border);
      border-radius:8px; color:var(--text1); font-size:14px; outline:none; resize:none;
      font-family:inherit; min-height:42px; max-height:100px;
    }
    .note-input:focus { border-color:var(--accent); }
    .note-input::placeholder { color:var(--text3); }
    .note-add-btn {
      padding:10px 14px; background:var(--accent); border:none; border-radius:8px;
      color:#fff; font-size:14px; cursor:pointer; white-space:nowrap; align-self:flex-end;
    }

    /* Drawing Canvas */
    .draw-container { flex:1; display:flex; flex-direction:column; overflow:hidden; display:none; }
    .draw-container.visible { display:flex; }
    .draw-tools {
      display:flex; align-items:center; gap:6px; padding:8px 14px;
      border-bottom:1px solid var(--border); flex-wrap:wrap;
    }
    .color-dot {
      width:24px; height:24px; border-radius:50%; border:2px solid transparent;
      cursor:pointer; transition:all .2s;
    }
    .color-dot.active { border-color:#333; transform:scale(1.15); }
    .size-btn {
      padding:4px 10px; background:var(--bg3); border:1px solid var(--border);
      border-radius:6px; color:var(--text2); font-size:11px; cursor:pointer;
    }
    .size-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
    .draw-canvas-wrap { flex:1; position:relative; overflow:hidden; background:#ffffff; }
    .draw-canvas {
      width:100%; height:100%; touch-action:none; cursor:crosshair;
    }

    /* Handwriting Input */
    .hw-container { flex:1; display:flex; flex-direction:column; overflow:hidden; display:none; }
    .hw-container.visible { display:flex; }
    .hw-canvas-wrap { flex:1; position:relative; overflow:hidden; background:#ffffff; border-bottom:1px solid var(--border); }
    .hw-canvas { width:100%; height:100%; touch-action:none; cursor:crosshair; }
    .hw-preview {
      padding:10px 14px; min-height:48px; background:var(--bg2); font-size:15px;
      color:var(--text1); line-height:1.5; border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:8px; flex-shrink:0;
    }
    .hw-preview-text { flex:1; min-height:24px; word-break:break-word; }
    .hw-preview-text:empty::before { content:'在上方手寫，辨識結果會顯示在這裡'; color:var(--text3); font-size:13px; }
    .hw-actions { display:flex; gap:6px; padding:8px 14px; flex-shrink:0; }
    .hw-actions .btn { flex:1; justify-content:center; }

    /* Notes list container (text mode) */
    .notes-text-view { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .notes-text-view.hidden { display:none; }

    /* ===== FLOATING SUBTITLE ===== */
    .subtitle-overlay {
      display:none; position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
      width:85%; max-width:700px; background:rgba(255,255,255,.95); backdrop-filter:blur(16px);
      border-radius:14px; padding:16px 24px; z-index:10000;
      border:1px solid var(--border); box-shadow:0 16px 48px rgba(0,0,0,.15); cursor:move;
    }
    .subtitle-overlay.visible { display:block; }
    .subtitle-original { font-size:18px; color:var(--text1); line-height:1.5; text-align:center; margin-bottom:6px; }
    .subtitle-translation { font-size:16px; color:var(--accent); line-height:1.5; text-align:center; }
    .subtitle-close { position:absolute; top:6px; right:10px; background:none; border:none; color:var(--text3); font-size:16px; cursor:pointer; }

    /* ===== HISTORY MODAL ===== */
    .modal-overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.4);
      z-index:20000; justify-content:center; align-items:center; padding:20px;
    }
    .modal-overlay.visible { display:flex; }
    .modal {
      background:var(--bg2); border:1px solid var(--border); border-radius:14px;
      width:100%; max-width:500px; max-height:80vh; display:flex; flex-direction:column;
      overflow:hidden;
    }
    .modal-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 18px; border-bottom:1px solid var(--border); flex-shrink:0;
    }
    .modal-header h3 { font-size:16px; font-weight:600; }
    .modal-close { background:none; border:none; color:var(--text3); font-size:18px; cursor:pointer; }
    .modal-body { flex:1; overflow-y:auto; padding:10px 18px; }
    .history-item {
      display:flex; justify-content:space-between; align-items:center;
      padding:12px; margin-bottom:8px; background:var(--bg3); border-radius:8px;
      border:1px solid var(--border); cursor:pointer; transition:all .2s;
    }
    .history-item:hover { border-color:var(--accent); }
    .history-info { flex:1; min-width:0; }
    .history-date { font-size:13px; font-weight:500; color:var(--text1); }
    .history-meta { font-size:11px; color:var(--text3); margin-top:2px; }
    .history-del { background:none; border:none; color:var(--text3); cursor:pointer; font-size:14px; padding:4px 8px; }
    .history-del:hover { color:var(--err); }
    .history-empty { text-align:center; color:var(--text3); padding:30px; font-size:14px; }

    /* ===== COLLAPSIBLE PANELS ===== */
    .panel-toggle {
      background:none; border:none; color:var(--text3); cursor:pointer; font-size:14px;
      padding:2px 6px; border-radius:4px; transition:all .2s; line-height:1;
    }
    .panel-toggle:hover { color:var(--text1); background:var(--bg3); }
    .panel-notes.collapsed, .panel-claude.collapsed {
      flex:0 0 auto !important; width:auto !important; min-height:0 !important;
    }
    .panel-notes.collapsed > :not(.notes-header),
    .panel-claude.collapsed > :not(.claude-header) { display:none !important; }
    /* Desktop collapsed: just a narrow strip */
    @media(min-width:769px) {
      .panel-notes.collapsed { width:46px !important; }
      .panel-claude.collapsed { width:46px !important; }
      .panel-notes.collapsed .notes-header,
      .panel-claude.collapsed .claude-header {
        writing-mode:vertical-rl; text-orientation:mixed;
        padding:14px 8px; justify-content:center; border-bottom:none;
      }
      .panel-notes.collapsed .notes-header > *:not(.panel-toggle),
      .panel-claude.collapsed .claude-header > *:not(.panel-toggle) { display:none; }
      .panel-notes.collapsed .panel-toggle,
      .panel-claude.collapsed .panel-toggle {
        writing-mode:horizontal-tb; margin:0;
      }
    }
    /* Mobile/vertical collapsed: just a thin bar */
    @media(max-width:768px) {
      body.vertical-mode .panel-notes.collapsed,
      body.vertical-mode .panel-claude.collapsed {
        flex:0 0 38px !important;
      }
    }

    /* Notes mode dropdown */
    .notes-mode-sel {
      padding:4px 8px; background:var(--bg3); border:1px solid var(--border);
      border-radius:6px; color:var(--text1); font-size:12px; outline:none; cursor:pointer;
    }

    /* ===== TOPIC BAR ===== */
    .topic-bar {
      display:flex; align-items:center; gap:8px; padding:6px 16px;
      background:var(--bg2); border-bottom:1px solid var(--border); flex-shrink:0;
    }
    .topic-input {
      flex:1; padding:6px 10px; background:var(--bg3); border:1px solid var(--border);
      border-radius:8px; color:var(--text1); font-size:13px; outline:none;
      font-family:inherit;
    }
    .topic-input:focus { border-color:var(--accent); }

    @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  </style>
</head>

  <div class="subtitle-translation" id="subTrans"></div>

<script>
// ==================== STATE ====================
const state = {
  recording: false,
  startTime: null,
  entries: [],    // {id, time, timeOffset, original, translation}
  notes: [],      // {id, time, timeOffset, text}
  audioChunks: [],
  audioBlob: null,
  audioUrl: null,
};

// ==================== MEETING TOPIC ====================
function getMeetingTopic() {
  return document.getElementById('meetingTopic')?.value?.trim() || '';
}
// Restore on load
document.getElementById('meetingTopic').value = localStorage.getItem('lt-meeting-topic') || '';
let recognition = null;
let mediaRecorder = null;
let audioEl = null;
let timerIv = null;
let subtitleOn = false;

// ==================== SPEECH RECOGNITION ====================
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

function createRecognition() {
  if (!SR) {
    const ua = navigator.userAgent;
    const isHTTPS = location.protocol === 'https:';
    if (/iPhone|iPad/.test(ua)) {
      if (!isHTTPS) toast('iOS 需要 HTTPS 才能使用語音辨識，請用 HTTPS 連結');
      else toast('語音辨識不可用。請確認 Safari 設定 → 網站 → 麥克風 已允許');
    }
    else if (/Android/.test(ua)) toast('請使用 Chrome 瀏覽器');
    else toast('此瀏覽器不支援語音辨識，請用 Chrome 或 Edge');
    return null;
  }
  const r = new SR();
  r.lang = document.getElementById('srcLang').value;
  r.continuous = true;
  r.interimResults = true;
  r.maxAlternatives = 1;

  r.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    if (interim && subtitleOn) {
      document.getElementById('subOrig').textContent = interim;
      document.getElementById('subOrig').style.opacity = '0.5';
    }
    if (final.trim()) addEntry(final.trim());
  };

  r.onerror = (e) => {
    if (e.error === 'no-speech') return;
    if (e.error === 'not-allowed') { toast('請允許麥克風權限'); stopRec(); }
    console.error('SR error:', e.error);
  };

  r.onend = () => {
    if (state.recording) {
      setTimeout(() => { if (state.recording) { r.lang = document.getElementById('srcLang').value; try { r.start(); } catch(ex){} } }, 100);
    }
  };

  return r;
}

// ==================== RECORDING ====================
// ==================== AUDIO SOURCE ====================
let audioSource = 'mic'; // 'mic' or 'system'
let displayStream = null;

function toggleAudioSource() {
  if (state.recording) { toast('請先停止錄音再切換'); return; }
  // Check if screen capture with audio is supported
  if (!navigator.mediaDevices.getDisplayMedia) {
    toast('此裝置不支援系統音訊擷取，僅電腦 Chrome 可用');
    return;
  }
  audioSource = audioSource === 'mic' ? 'system' : 'mic';
  const btn = document.getElementById('audioSrcBtn');
  btn.textContent = audioSource === 'mic' ? '🎤' : '🖥️';
  btn.title = audioSource === 'mic' ? '目前：麥克風（點擊切換系統音訊）' : '目前：系統音訊（點擊切換麥克風）';
  toast(audioSource === 'mic' ? '🎤 已切換為麥克風' : '🖥️ 已切換為系統音訊（選擇要擷取的分頁）');
}

function toggleRec() {
  state.recording ? stopRec() : startRec();
}

async function startRec() {
  recognition = createRecognition();
  if (!recognition) return;

  // Start audio recording
  try {
    let stream;
    if (audioSource === 'system') {
      // Capture system/tab audio via getDisplayMedia
      try {
        displayStream = await navigator.mediaDevices.getDisplayMedia({
          video: true,  // required by API, we'll ignore video
          audio: true,
          preferCurrentTab: false,
          systemAudio: 'include',
        });
        // Check if audio track was granted
        const audioTracks = displayStream.getAudioTracks();
        if (audioTracks.length === 0) {
          toast('未選擇音訊來源，請重新選擇並勾選「分享音訊」');
          displayStream.getTracks().forEach(t => t.stop());
          displayStream = null;
          return;
        }
        // Create audio-only stream for recording
        stream = new MediaStream(audioTracks);
        // Stop video track to save resources
        displayStream.getVideoTracks().forEach(t => t.stop());
        // Listen for user stopping screen share
        audioTracks[0].onended = () => {
          if (state.recording) stopRec();
        };
      } catch (err) {
        if (err.name === 'NotAllowedError') {
          toast('已取消選擇');
        } else {
          toast('系統音訊擷取失敗：' + err.message);
        }
        return;
      }
    } else {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    }

    mediaRecorder = new MediaRecorder(stream);
    state.audioChunks = [];
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) state.audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      state.audioBlob = new Blob(state.audioChunks, { type: 'audio/webm' });
      state.audioUrl = URL.createObjectURL(state.audioBlob);
      showAudioPlayer();
    };
    mediaRecorder.start(1000);
  } catch (err) {
    console.warn('Audio recording failed:', err);
  }

  recognition.start();
  state.recording = true;
  state.startTime = Date.now();

  document.getElementById('recBtn').classList.add('on');
  document.getElementById('recHint').textContent = audioSource === 'system' ? '擷取中...' : '按下停止';
  document.getElementById('statusDot').classList.add('on');
  document.getElementById('timer').classList.add('on');

  const es = document.getElementById('emptyState');
  if (es) es.remove();

  timerIv = setInterval(updateTimer, 1000);
}

function stopRec() {
  state.recording = false;
  if (recognition) { recognition.stop(); recognition = null; }
  if (mediaRecorder && mediaRecorder.state !== 'inactive') { mediaRecorder.stop(); }
  // Stop display stream tracks
  if (displayStream) {
    displayStream.getTracks().forEach(t => t.stop());
    displayStream = null;
  }

  document.getElementById('recBtn').classList.remove('on');
  document.getElementById('recHint').textContent = '按下開始';
  document.getElementById('statusDot').classList.remove('on');
  document.getElementById('timer').classList.remove('on');
  clearInterval(timerIv);
}

function getTimeOffset() {
  return state.startTime ? (Date.now() - state.startTime) / 1000 : 0;
}

function fmtTime(sec) {
  const m = Math.floor(sec / 60).toString().padStart(2, '0');
  const s = Math.floor(sec % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function updateTimer() {
  if (!state.startTime) return;
  document.getElementById('timer').textContent = fmtTime(getTimeOffset());
}

// ==================== ENTRIES ====================
function addEntry(text) {
  const offset = getTimeOffset();
  const entry = {
    id: Date.now(),
    time: new Date().toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit',second:'2-digit'}),
    timeOffset: offset,
    original: text,
    translation: '',
  };
  state.entries.push(entry);
  renderEntry(entry);
  translateEntry(entry);
  queueClaudeTranslation(entry); // Queue for Claude enhancement if topic is set
  // Auto-save every 5 entries
  if (state.entries.length % 5 === 0) saveSession();

  if (subtitleOn) {
    document.getElementById('subOrig').textContent = text;
    document.getElementById('subOrig').style.opacity = '1';
  }

  // Auto-scroll
  const s = document.getElementById('transcriptScroll');
  s.scrollTop = s.scrollHeight;
}

function renderEntry(entry) {
  const div = document.createElement('div');
  div.className = 'entry';
  div.id = `e-${entry.id}`;
  div.onclick = () => seekToOffset(entry.timeOffset);
  div.innerHTML = `
    <div class="entry-time">${fmtTime(entry.timeOffset)}</div>
    <div class="entry-content">
      <div class="entry-original">${entry.original}</div>
      <div class="entry-translation" id="et-${entry.id}"></div>
    </div>`;
  document.getElementById('transcriptScroll').appendChild(div);
}

// ==================== TRANSLATION (faster with cache + abort) ====================
const transCache = {};
let transController = null;

async function translateEntry(entry) {
  const src = document.getElementById('srcLang').value.split('-')[0];
  const tgt = document.getElementById('tgtLang').value;

  if (src === tgt.split('-')[0]) {
    entry.translation = entry.original;
    updateTransUI(entry);
    return;
  }

  // Cache hit
  const cacheKey = `${src}|${tgt}|${entry.original}`;
  if (transCache[cacheKey]) {
    entry.translation = transCache[cacheKey];
    updateTransUI(entry);
    return;
  }

  try {
    // Use AbortController for timeout (3s)
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 3000);

    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${src}&tl=${tgt}&dt=t&q=${encodeURIComponent(entry.original)}`;
    const res = await fetch(url, { signal: ctrl.signal });
    clearTimeout(timer);
    const data = await res.json();
    entry.translation = data[0].map(r => r[0]).join('');
    transCache[cacheKey] = entry.translation;
  } catch (err) {
    // Fallback to MyMemory (also with timeout)
    try {
      const ctrl2 = new AbortController();
      const timer2 = setTimeout(() => ctrl2.abort(), 3000);
      const url2 = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(entry.original)}&langpair=${src}|${tgt}`;
      const res2 = await fetch(url2, { signal: ctrl2.signal });
      clearTimeout(timer2);
      const data2 = await res2.json();
      entry.translation = data2.responseData?.translatedText || '[翻譯失敗]';
      if (entry.translation && entry.translation !== '[翻譯失敗]') transCache[cacheKey] = entry.translation;
    } catch { entry.translation = '[翻譯中...]'; }
  }

  updateTransUI(entry);
}

function updateTransUI(entry) {
  const el = document.getElementById(`et-${entry.id}`);
  if (el) {

  }
  if (subtitleOn && state.entries.length && state.entries[state.entries.length-1].id === entry.id) {
    document.getElementById('subTrans').textContent = entry.translation;

}

// ==================== CLAUDE BATCH TRANSLATION ENHANCEMENT ====================
const langNames = {
  'en': 'English', 'zh': '中文（繁體）', 'ja': '日本語', 'ko': '한국어',
  'fr': 'Français', 'de': 'Deutsch', 'es': 'Español', 'th': 'ภาษาไทย', 'vi': 'Tiếng Việt',
};
let claudeTransQueue = [];
let claudeTransTimer = null;

function queueClaudeTranslation(entry) {
  if (!getMeetingTopic()) return; // Only when topic is set
  claudeTransQueue.push(entry);
  if (claudeTransTimer) clearTimeout(claudeTransTimer);
  claudeTransTimer = setTimeout(() => {
    const batch = claudeTransQueue.splice(0);
    if (batch.length) claudeBatchTranslate(batch);
  }, 10000); // 10-second debounce
}

async function claudeBatchTranslate(entries) {
  const topic = getMeetingTopic();
  if (!topic || !entries.length) return;

  const src = document.getElementById('srcLang').value.split('-')[0];
  const tgt = document.getElementById('tgtLang').value.split('-')[0];
  const srcName = langNames[src] || src;
  const tgtName = langNames[tgt] || tgt;

  const textBlock = entries.map((e, i) => `[${i}] ${e.original}`).join('\n');

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: `You are a professional translator. Context/topic: "${topic}". Translate from ${srcName} to ${tgtName}. Use proper terminology for this context. Fix any speech recognition errors you can detect. Return ONLY the translations, one per line, each prefixed with [index]. Example:\n[0] 翻譯內容\n[1] 翻譯內容`,
        messages: [{ role: 'user', content: textBlock }],
      }),
    });
    if (!res.ok) return;
    const data = await res.json();
    const reply = data.content?.[0]?.text || '';
    const lines = reply.split('\n');
    lines.forEach(line => {
      const match = line.match(/^\[(\d+)\]\s*(.+)/);
      if (match) {
        const idx = parseInt(match[1]);
        const translation = match[2].trim();
        if (entries[idx] && translation) {
          entries[idx].translation = translation;
          entries[idx]._claudeTranslated = true;
          updateTransUI(entries[idx]);
        }
      }
    });
  } catch (err) {
    console.warn('Claude batch translate failed:', err);
  }
}

function seekAudio(val) {
  if (!audioEl || !audioEl.duration) return;
  audioEl.currentTime = (val / 100) * audioEl.duration;

function seekToOffset(offset) {
  if (audioEl && audioEl.duration) {

    if (el) {
      el.classList.add('highlight');
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      setTimeout(() => el.classList.remove('highlight'), 3000);

// ==================== DRAWING CANVAS ====================
let drawCtx, drawColor = '#222', drawSize = 2, isDrawing = false, strokes = [], currentStroke = [];

function initCanvas() {
  const canvas = document.getElementById('drawCanvas');
  const wrap = canvas.parentElement;
  drawCtx = canvas.getContext('2d');

  function resize() {
    const rect = wrap.getBoundingClientRect();
    canvas.width = rect.width * window.devicePixelRatio;
    canvas.height = rect.height * window.devicePixelRatio;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    drawCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
    redrawStrokes();
  }

  new ResizeObserver(resize).observe(wrap);
  setTimeout(resize, 100);

  canvas.addEventListener('pointerdown', (e) => {
    isDrawing = true;
    currentStroke = [];
    const pt = getCanvasPoint(e, canvas);
    pt.color = drawColor;
    pt.size = drawSize;
    pt.pressure = e.pressure || 0.5;
    currentStroke.push(pt);
    drawCtx.beginPath();
    drawCtx.moveTo(pt.x, pt.y);
  });

  canvas.addEventListener('pointermove', (e) => {
    if (!isDrawing) return;
    const pt = getCanvasPoint(e, canvas);
    pt.color = drawColor;
    pt.size = drawSize;
    pt.pressure = e.pressure || 0.5;
    currentStroke.push(pt);

    drawCtx.strokeStyle = pt.color;
    drawCtx.lineWidth = pt.size * (0.5 + pt.pressure);
    drawCtx.lineCap = 'round';
    drawCtx.lineJoin = 'round';
    drawCtx.lineTo(pt.x, pt.y);
    drawCtx.stroke();
    drawCtx.beginPath();
    drawCtx.moveTo(pt.x, pt.y);
  });

  const endDraw = () => {
    if (isDrawing && currentStroke.length > 0) {
      strokes.push([...currentStroke]);
      currentStroke = [];
    }
    isDrawing = false;
  };

  canvas.addEventListener('pointerup', endDraw);
  canvas.addEventListener('pointerleave', endDraw);
  canvas.addEventListener('pointercancel', endDraw);
}

function getCanvasPoint(e, canvas) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function redrawStrokes() {
  if (!drawCtx) return;
  const canvas = document.getElementById('drawCanvas');
  drawCtx.clearRect(0, 0, canvas.width, canvas.height);
  strokes.forEach(stroke => {
    if (stroke.length < 2) return;
    for (let i = 1; i < stroke.length; i++) {
      const p = stroke[i];
      drawCtx.strokeStyle = p.color;
      drawCtx.lineWidth = p.size * (0.5 + (p.pressure || 0.5));
      drawCtx.lineCap = 'round';
      drawCtx.lineJoin = 'round';
      drawCtx.beginPath();
      drawCtx.moveTo(stroke[i-1].x, stroke[i-1].y);
      drawCtx.lineTo(p.x, p.y);
      drawCtx.stroke();
    }
  });
}

function setColor(c, el) {
  drawColor = c;
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
  el.classList.add('active');
}

function setSize(s, el) {
  drawSize = s;
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function undoStroke() {
  strokes.pop();
  redrawStrokes();
}

function clearCanvas() {
  if (strokes.length && !confirm('確定清除所有繪圖？')) return;
  strokes = [];
  redrawStrokes();
}

// ==================== HANDWRITING INPUT ====================
let hwCtx, hwStrokes = [], hwCurrentStroke = [], hwDrawing = false;
let hwRecogTimer = null;

function initHwCanvas() {
  const canvas = document.getElementById('hwCanvas');
  const wrap = canvas.parentElement;
  hwCtx = canvas.getContext('2d');

  function resize() {
    const rect = wrap.getBoundingClientRect();
    canvas.width = rect.width * window.devicePixelRatio;
    canvas.height = rect.height * window.devicePixelRatio;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    hwCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
    hwRedraw();
  }

  new ResizeObserver(resize).observe(wrap);
  setTimeout(resize, 100);

  canvas.addEventListener('pointerdown', (e) => {
    hwDrawing = true;
    hwCurrentStroke = [];
    const pt = hwGetPoint(e, canvas);
    hwCurrentStroke.push(pt);
    hwCtx.beginPath();
    hwCtx.moveTo(pt.x, pt.y);
    // Cancel pending recognition while user is still writing
    if (hwRecogTimer) { clearTimeout(hwRecogTimer); hwRecogTimer = null; }
  });

  canvas.addEventListener('pointermove', (e) => {
    if (!hwDrawing) return;
    const pt = hwGetPoint(e, canvas);
    hwCurrentStroke.push(pt);
    hwCtx.strokeStyle = '#c89600';
    hwCtx.lineWidth = 3;
    hwCtx.lineCap = 'round';
    hwCtx.lineJoin = 'round';
    hwCtx.lineTo(pt.x, pt.y);
    hwCtx.stroke();
    hwCtx.beginPath();
    hwCtx.moveTo(pt.x, pt.y);
  });

  const endHw = () => {
    if (hwDrawing && hwCurrentStroke.length > 1) {
      hwStrokes.push([...hwCurrentStroke]);
      hwCurrentStroke = [];
      // Auto-recognize after 1s of no new strokes
      if (hwRecogTimer) clearTimeout(hwRecogTimer);
      hwRecogTimer = setTimeout(() => hwRecognize(), 1000);
    }
    hwDrawing = false;
  };

  canvas.addEventListener('pointerup', endHw);
  canvas.addEventListener('pointerleave', endHw);
  canvas.addEventListener('pointercancel', endHw);
}

function hwGetPoint(e, canvas) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top, t: Date.now() };
}

function hwRedraw() {
  if (!hwCtx) return;
  const canvas = document.getElementById('hwCanvas');
  hwCtx.clearRect(0, 0, canvas.width, canvas.height);
  // Draw guide lines
  const wrap = canvas.parentElement;
  const h = wrap.getBoundingClientRect().height;
  hwCtx.strokeStyle = 'rgba(0,0,0,0.06)';
  hwCtx.lineWidth = 1;
  for (let y = 40; y < h; y += 40) {
    hwCtx.beginPath(); hwCtx.moveTo(0, y); hwCtx.lineTo(wrap.getBoundingClientRect().width, y); hwCtx.stroke();
  }
  // Redraw strokes
  hwStrokes.forEach(stroke => {
    if (stroke.length < 2) return;
    hwCtx.strokeStyle = '#c89600';
    hwCtx.lineWidth = 3;
    hwCtx.lineCap = 'round';
    hwCtx.lineJoin = 'round';
    for (let i = 1; i < stroke.length; i++) {
      hwCtx.beginPath();
      hwCtx.moveTo(stroke[i-1].x, stroke[i-1].y);
      hwCtx.lineTo(stroke[i].x, stroke[i].y);
      hwCtx.stroke();
    }
  });
}

async function hwRecognize() {
  if (!hwStrokes.length) return;
  const preview = document.getElementById('hwPreview');
  preview.textContent = '辨識中...';

  // Build ink data for Google Handwriting API
  const ink = hwStrokes.map(stroke => {
    const xs = stroke.map(p => Math.round(p.x));
    const ys = stroke.map(p => Math.round(p.y));
    return [xs, ys];
  });

  // Determine writing language from source lang
  const srcLang = document.getElementById('srcLang').value;
  let hwLang = 'zh-TW'; // default
  if (srcLang.startsWith('en')) hwLang = 'en';
  else if (srcLang.startsWith('ja')) hwLang = 'ja';
  else if (srcLang.startsWith('ko')) hwLang = 'ko';
  else if (srcLang.startsWith('zh-CN')) hwLang = 'zh-CN';
  else if (srcLang.startsWith('zh-TW')) hwLang = 'zh-TW';
  else if (srcLang.startsWith('fr')) hwLang = 'fr';
  else if (srcLang.startsWith('de')) hwLang = 'de';
  else if (srcLang.startsWith('es')) hwLang = 'es';
  else if (srcLang.startsWith('th')) hwLang = 'th';
  else if (srcLang.startsWith('vi')) hwLang = 'vi';

  try {
    const canvas = document.getElementById('hwCanvas');
    const wrap = canvas.parentElement;
    const rect = wrap.getBoundingClientRect();

    const payload = {
      options: "enable_pre_space",
      requests: [{
        writing_guide: {
          writing_area_width: Math.round(rect.width),
          writing_area_height: Math.round(rect.height)
        },
        ink: ink,
        language: hwLang
      }]
    };

    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 5000);
    const res = await fetch(`https://www.google.com.tw/inputtools/request?ime=handwriting&app=mobilesearch&cs=1&oe=UTF-8`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: ctrl.signal
    });
    clearTimeout(timer);

    const data = await res.json();
    if (data && data[0] === 'SUCCESS' && data[1] && data[1][0] && data[1][0][1]) {
      const candidates = data[1][0][1];
      preview.textContent = candidates[0] || '（無法辨識）';
    } else {
      preview.textContent = '（無法辨識，請重試）';
    }
  } catch (err) {
    console.error('HW recognition error:', err);
    preview.textContent = '（辨識失敗，請重試）';
  }
}

function hwClear() {
  hwStrokes = [];
  hwRedraw();
  document.getElementById('hwPreview').textContent = '';
  if (hwRecogTimer) { clearTimeout(hwRecogTimer); hwRecogTimer = null; }
}

function hwUndo() {
  hwStrokes.pop();
  hwRedraw();
  // Re-recognize with remaining strokes
  if (hwStrokes.length > 0) {
    if (hwRecogTimer) clearTimeout(hwRecogTimer);
    hwRecogTimer = setTimeout(() => hwRecognize(), 500);
  } else {
    document.getElementById('hwPreview').textContent = '';
  }
}

function hwAddNote() {
  const preview = document.getElementById('hwPreview');
  const text = preview.textContent.trim();
  if (!text || text.startsWith('（') || text === '辨識中...') {

  }
  // Add as a note

    timeOffset: offset,
    text: text
  };
  state.notes.push(note);
  renderNote(note);
  // Clear canvas
  hwClear();
  toast('已加入筆記');
}

    const res = await fetch('/api/save-key', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ apiKey: key }),
    });
    if (res.ok) {
      toast('API Key 已儲存到伺服器，所有裝置可共用');
    }
  } catch {
    // Fallback save to localStorage
    localStorage.setItem('claude_api_key', key);
    toast('API Key 已儲存（僅限此裝置）');
  }
  document.getElementById('claudeSetup').style.display = 'none';
  document.getElementById('claudeMsgs').style.display = 'flex';
  document.getElementById('quickBtns').style.display = 'flex';
  document.getElementById('claudeInputArea').style.display = 'flex';
  addClaudeMsg('system', '已連線！你可以問我任何問題，我會參考即時逐字稿回答。');
}

function showClaudeSetup() {
  const setup = document.getElementById('claudeSetup');
  setup.style.display = setup.style.display === 'none' ? 'flex' : 'none';
}

function addClaudeMsg(type, text) {
  const cls = type === 'user' ? 'cmsg-user' : type === 'ai' ? 'cmsg-ai' : 'cmsg-system';
  const div = document.createElement('div');
  div.className = `cmsg ${cls}`;
  // Simple markdown: **bold**, `code`, ```code blocks```
  let html = text
    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
  div.innerHTML = html;
  document.getElementById('claudeMsgs').appendChild(div);
  document.getElementById('claudeMsgs').scrollTop = document.getElementById('claudeMsgs').scrollHeight;
  return div;
}

function getTranscriptContext() {
  if (!state.entries.length) return '（目前沒有逐字稿內容）';
  // Include last 30 entries max to fit context
  const recent = state.entries.slice(-30);
  return recent.map(e => {
    let line = `[${fmtTime(e.timeOffset)}] ${e.original}`;
    if (e.translation) line += `\n→ ${e.translation}`;
    return line;
  }).join('\n\n');
}

// ==================== SUMMARIZE TRANSCRIPT ====================
async function summarizeTranscript() {
  if (!state.entries.length) { toast('還沒有逐字稿內容'); return; }

  const apiKey = localStorage.getItem('claude_api_key') || '';
  const transcript = state.entries.map(e => {
    let line = `[${fmtTime(e.timeOffset)}] ${e.original}`;
    if (e.translation) line += ` → ${e.translation}`;
    return line;
  }).join('\n');

  // Show loading modal
  const modal = document.getElementById('summaryModal');
  const body = document.getElementById('summaryBody');
  body.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text3);">✨ AI 正在整理重點...</div>';
  modal.classList.add('visible');

  try {
    const topic = getMeetingTopic();
    const sysPrompt = `你是一位專業的會議/課堂記錄整理助理。請用繁體中文回答。
${topic ? `本場會議/課堂主題：「${topic}」。請使用你對此主題的專業知識來理解內容、正確翻譯專有名詞、並深入整理。` : ''}
你的任務是將零散的即時語音辨識逐字稿，整理成結構清晰、有深度的會議/課堂記錄。`;

    const userMsg = `請幫我整理以下逐字稿。注意：逐字稿來自即時語音辨識，可能有辨識錯誤或斷句不完整，請用你的理解力修正。

請嚴格按照以下格式輸出：

## 📌 重點整理
列出這場${topic ? `「${topic}」` : '會議/課堂'}的 3-5 個核心主題或重點，每個用一小段話說明。

## 🔑 關鍵觀點
列出最重要的觀點、洞見或教導，每一條包含：
- 觀點的核心概念（用自己的話清楚說明）
- 如果有精彩的原文表述，用「」引用原文

## 🏗️ 其他情境內容
補充值得記錄的背景資訊，例如：具體案例、問答互動、提到的人物或事件等。

## 💡 一句話總結
用一句話概括這場${topic ? `「${topic}」` : '會議/課堂'}的核心訊息或收穫。

---
逐字稿內容：
${transcript}`;

    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        apiKey,
        system: sysPrompt,
        messages: [{ role: 'user', content: userMsg }],
      }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      body.innerHTML = `<div style="color:var(--err);padding:20px;">❌ ${err.error?.message || err.error || 'API 錯誤'}</div>`;
      return;
    }

    const data = await res.json();
    const reply = data.content?.[0]?.text || '（無回應）';

    // Render markdown-like formatting
    const html = reply
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/^### (.*$)/gm, '<h4 style="margin:12px 0 6px;color:var(--accent);">$1</h4>')
      .replace(/^## (.*$)/gm, '<h3 style="margin:14px 0 8px;color:var(--accent);">$1</h3>')
      .replace(/^# (.*$)/gm, '<h2 style="margin:16px 0 8px;color:var(--accent);">$1</h2>')
      .replace(/^[-•] (.*$)/gm, '<div style="padding:2px 0 2px 16px;">• $1</div>')
      .replace(/^(\d+)\. (.*$)/gm, '<div style="padding:2px 0 2px 16px;">$1. $2</div>')
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>');

    body.innerHTML = `<div style="font-size:14px;line-height:1.7;color:var(--text1);">${html}</div>`;
  } catch (err) {
    body.innerHTML = `<div style="color:var(--err);padding:20px;">❌ 連線錯誤：${err.message}</div>`;
  }
}

}

function quickAsk(question) {
  document.getElementById('claudeInput').value = question;
  sendClaude();
}

async function sendClaude() {
  const input = document.getElementById('claudeInput');
  const text = input.value.trim();
  if (!text || claudeSending) return;

  const apiKey = localStorage.getItem('claude_api_key') || '';

  // Add user message
  addClaudeMsg('user', text);
  claudeMessages.push({ role: 'user', content: text });
  input.value = '';
  input.style.height = '42px';

  // Show typing indicator
  claudeSending = true;
  document.getElementById('claudeSend').disabled = true;
  const typing = document.createElement('div');
  typing.className = 'cmsg cmsg-typing';
  typing.textContent = '思考中';
  document.getElementById('claudeMsgs').appendChild(typing);
  document.getElementById('claudeMsgs').scrollTop = document.getElementById('claudeMsgs').scrollHeight;

  // Build system prompt with transcript
  const transcript = getTranscriptContext();
  const topic = getMeetingTopic();
  const systemPrompt = `你是一個會議/課堂助理。用戶正在參加一場會議或課程。${topic ? `\n本場主題：「${topic}」。請使用你對此主題的專業知識來回答問題。` : ''}
以下是目前的即時逐字稿（含翻譯）。請根據逐字稿內容回答用戶的問題。用繁體中文回答。

===== 即時逐字稿 =====
${transcript}
===== 逐字稿結束 =====

注意事項：
- 回答要簡潔明確
- 如果用戶問的問題在逐字稿中沒有相關內容，請誠實說明
- 可以幫忙總結、解釋、列出重點或待辦事項
- 逐字稿來自即時語音辨識，可能有辨識錯誤，請用你的理解力修正`;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        apiKey,
        system: systemPrompt,
        messages: claudeMessages.slice(-20), // Keep last 20 messages
      }),
    });

    typing.remove();

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      const errMsg = err.error?.message || err.error || `API 錯誤 (${res.status})`;
      addClaudeMsg('system', `❌ ${errMsg}`);
      if (res.status === 401) addClaudeMsg('system', '請檢查 API Key 是否正確。');
    } else {
      const data = await res.json();
      const reply = data.content?.[0]?.text || '（無回應）';
      addClaudeMsg('ai', reply);
      claudeMessages.push({ role: 'assistant', content: reply });
    }
  } catch (err) {
    typing.remove();
    addClaudeMsg('system', `❌ 連線錯誤：${err.message}`);
  }

  claudeSending = false;
  document.getElementById('claudeSend').disabled = false;
}

function claudeKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendClaude(); }
  setTimeout(() => {

    e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';

// ==================== SESSION HISTORY ====================
function saveSession() {
  if (!state.entries.length) return;
  const sessions = JSON.parse(localStorage.getItem('lt-sessions') || '[]');
  const session = {
    id: state.sessionId || Date.now(),
    date: new Date().toLocaleString('zh-TW'),
    entries: state.entries,
    notes: state.notes,
    entryCount: state.entries.length,
    noteCount: state.notes.length,
    duration: state.startTime ? fmtTime((Date.now() - state.startTime) / 1000) : '00:00',
    meetingTopic: getMeetingTopic(),
  };
  // Update existing or add new
  const idx = sessions.findIndex(s => s.id === session.id);
  if (idx >= 0) sessions[idx] = session;
  else sessions.unshift(session);
  // Keep last 50 sessions
  if (sessions.length > 50) sessions.length = 50;
  localStorage.setItem('lt-sessions', JSON.stringify(sessions));

  // Also save to server (async, non-blocking)
  fetch('/api/sessions/save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(session),
  }).catch(() => {}); // Silently fail if server unreachable
}

// Auto-save every 30 seconds while recording
setInterval(() => { if (state.recording) saveSession(); }, 30000);

// Also save when stopping recording
const origStopRec = stopRec;
stopRec = function() {
  origStopRec();
  saveSession();
};

// Auto-save when page is closed/refreshed
window.addEventListener('beforeunload', () => { saveSession(); });

// Give current session an ID
state.sessionId = Date.now();

// Auto-restore last session on page load
(function autoRestore() {
  const sessions = JSON.parse(localStorage.getItem('lt-sessions') || '[]');
  if (!sessions.length) return;
  const last = sessions[0]; // most recent
  // Only auto-restore if it was saved within the last 12 hours
  const savedTime = last.id || 0;
  if (Date.now() - savedTime > 12 * 60 * 60 * 1000) return;
  state.entries = last.entries || [];
  state.notes = last.notes || [];
  state.sessionId = last.id;
  // Restore meeting topic
  if (last.meetingTopic) {
    document.getElementById('meetingTopic').value = last.meetingTopic;
    localStorage.setItem('lt-meeting-topic', last.meetingTopic);
  }
  // Re-render
  if (state.entries.length) {
    const scroll = document.getElementById('transcriptScroll');
    scroll.innerHTML = '';
    state.entries.forEach(e => renderEntry(e));
  }
  if (state.notes.length) {
    state.notes.forEach(n => renderNote(n));
  }
})();

async function showHistory() {
  const list = document.getElementById('historyList');
  list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text3);">載入中...</div>';
  document.getElementById('historyModal').classList.add('visible');

  // Get local sessions
  const localSessions = JSON.parse(localStorage.getItem('lt-sessions') || '[]');
  const localIds = new Set(localSessions.map(s => s.id));

  // Try to get server sessions
  let serverSessions = [];
  try {
    const res = await fetch('/api/sessions');
    if (res.ok) serverSessions = await res.json();
  } catch {}

  // Merge: add server-only sessions
  const merged = [...localSessions];
  serverSessions.forEach(s => {
    if (!localIds.has(s.id)) {
      s._serverOnly = true;
      merged.push(s);
    }
  });
  merged.sort((a, b) => b.id - a.id);

  if (!merged.length) {
    list.innerHTML = '<div class="history-empty">尚無歷史紀錄</div>';
  } else {
    list.innerHTML = merged.map(s => `
      <div class="history-item" onclick="loadSession(${s.id}, ${!!s._serverOnly})">
        <div class="history-info">
          <div class="history-date">${s.date} ${s._serverOnly ? '☁️' : ''}</div>
          <div class="history-meta">${s.entryCount} 段語音 · ${s.noteCount || 0} 筆記 · ${s.duration}${s.meetingTopic ? ' · ' + s.meetingTopic : ''}</div>
        </div>
        <button class="history-del" onclick="event.stopPropagation();deleteSession(${s.id})">🗑</button>
      </div>
    `).join('');
  }
}

function closeHistory() {
  document.getElementById('historyModal').classList.remove('visible');
}

async function loadSession(id, fromServer = false) {
  let session;
  if (fromServer) {
    try {
      const res = await fetch(`/api/sessions/${id}`);
      if (res.ok) session = await res.json();
    } catch {}
  }
  if (!session) {
    const sessions = JSON.parse(localStorage.getItem('lt-sessions') || '[]');
    session = sessions.find(s => s.id === id);
  }
  if (!session) { toast('找不到此紀錄'); return; }

  // Stop current recording if active
  if (state.recording) stopRec();

  state.entries = session.entries || [];
  state.notes = session.notes || [];
  state.sessionId = id;

  // Restore meeting topic
  if (session.meetingTopic) {
    document.getElementById('meetingTopic').value = session.meetingTopic;
    localStorage.setItem('lt-meeting-topic', session.meetingTopic);
  }

  // Re-render
  const scroll = document.getElementById('transcriptScroll');
  scroll.innerHTML = '';
  state.entries.forEach(e => renderEntry(e));

  const notesList = document.getElementById('notesList');
  notesList.innerHTML = '';
  state.notes.forEach(n => renderNote(n));

  closeHistory();
  toast(`已載入 ${session.date} 的紀錄`);
}

async function deleteSession(id) {
  // Delete from localStorage
  let sessions = JSON.parse(localStorage.getItem('lt-sessions') || '[]');
  sessions = sessions.filter(s => s.id !== id);
  localStorage.setItem('lt-sessions', JSON.stringify(sessions));
  // Delete from server
  try { await fetch(`/api/sessions/${id}`, { method: 'DELETE' }); } catch {}
  showHistory(); // Refresh list
}

// Close modal on overlay click
document.getElementById('historyModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeHistory();
});

// Init Claude on load
initClaude();

// Register Service Worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
